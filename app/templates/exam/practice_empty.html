{% extends "base.html" %}
{% block title %}做题 — 考研学习系统{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto text-center py-5">
        <i class="bi bi-journal-x" style="font-size: 4rem; color: #ddd;"></i>
        <h4 class="mt-3" style="color: #757575;">题库为空</h4>
        <p class="text-muted">还没有题目，先去录入一些吧！</p>
        <a href="{{ url_for('exam.create_question') }}" class="btn btn-warning mt-2"
           style="background-color: #FFA000; border-color: #FFA000; color: #fff;">
            <i class="bi bi-plus-lg me-1"></i>录入题目
        </a>
        <a href="{{ url_for('exam.list_questions') }}" class="btn btn-outline-secondary mt-2 ms-2">
            <i class="bi bi-journal-check me-1"></i>查看题库
        </a>
    </div>
</div>
{% endblock %}
