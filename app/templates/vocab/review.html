{% extends "base.html" %}
{% block title %}单词复习 — 考研学习系统{% endblock %}

{% block content %}
<style>
    .word-card { transition: background 0.3s; }
    .word-card.correct { background: #E8F5E9 !important; }
    .word-card.wrong { background: #FFEBEE !important; }
</style>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2" style="color:#FFA000;"></i>单词复习</h4>
    <span class="badge bg-warning text-dark fs-6">待复习 {{ counts.due }} 个</span>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-lg mb-4 word-card" id="word-card" style="min-height:350px;">
            <div class="card-body d-flex flex-column justify-content-center align-items-center p-5">
                <div class="mb-2">
                    <span class="badge bg-info me-2">阶段 {{ word.review_stage }}</span>
                    <span class="badge bg-light text-dark">复习 {{ word.review_count }} 次</span>
                </div>
                <div class="text-center mb-2" style="font-size:3rem;font-weight:bold;color:#333;">{{ word.word }}</div>
                {% if word.phonetic %}<div class="text-muted mb-4" style="font-size:1.2rem;">{{ word.phonetic }}</div>{% endif %}
                <div class="text-center mb-4" style="font-size:1.4rem;color:#555;min-height:40px;" id="meaning-area"></div>
            </div>
        </div>

        <div class="d-flex gap-3 justify-content-center" id="action-buttons">
            <button class="btn btn-lg px-5" style="background:#F44336;color:#fff;" onclick="rate('wrong')">
                <i class="bi bi-x-lg me-1"></i>不认识
            </button>
            <button class="btn btn-lg px-5" style="background:#4CAF50;color:#fff;" onclick="rate('correct')">
                <i class="bi bi-check-lg me-1"></i>认识
            </button>
        </div>

        <div class="text-center mt-3" id="next-btn" style="display:none;">
            <a href="{{ url_for('vocab.review') }}" class="btn btn-primary">
                <i class="bi bi-arrow-right me-1"></i>下一词
            </a>
        </div>
    </div>
</div>

<script>
var wordId = {{ word.id }};
var meaning = '{{ word.meaning|e }}';

function rate(result) {
    var card = document.getElementById('word-card');
    var meaningEl = document.getElementById('meaning-area');
    var btns = document.getElementById('action-buttons');
    var nextBtn = document.getElementById('next-btn');

    card.classList.add(result === 'correct' ? 'correct' : 'wrong');
    meaningEl.innerHTML = '<span class="'+(result==='correct'?'text-success':'text-danger')+'">'+meaning+'</span>';
    btns.style.display = 'none';
    nextBtn.style.display = 'block';

    var fd = new FormData();
    fd.append('result', result);
    fetch('/vocab/' + wordId + '/review', {method:'POST', body:fd});
}
</script>
{% endblock %}
