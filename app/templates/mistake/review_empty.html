{% extends "base.html" %}
{% block title %}错题复习 — 考研学习系统{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto text-center py-5">
        {% if total_active > 0 %}
            <i class="bi bi-hourglass-split" style="font-size: 4rem; color: #FFA000;"></i>
            <h4 class="mt-3" style="color: #FFA000;">当前没有到期的复习任务</h4>
            <p class="text-muted">共有 {{ total_active }} 道错题，但尚未到达记忆曲线规划的复习时间。</p>
            <p class="text-muted small">遵循艾宾浩斯遗忘曲线，在最佳时间点提醒你复习。</p>
            <a href="{{ url_for('mistake.list_mistakes') }}" class="btn btn-outline-secondary mt-2">
                <i class="bi bi-list me-1"></i>查看全部错题
            </a>
        {% else %}
            <i class="bi bi-emoji-smile" style="font-size: 4rem; color: #4CAF50;"></i>
            <h4 class="mt-3" style="color: #4CAF50;">没有错题，太棒了！</h4>
            <p class="text-muted">继续保持！去做题吧。</p>
            <a href="{{ url_for('exam.practice') }}" class="btn btn-warning mt-2"
               style="background-color: #FFA000; border-color: #FFA000; color: #fff;">
                <i class="bi bi-pencil-square me-1"></i>开始做题
            </a>
        {% endif %}
    </div>
</div>
{% endblock %}
