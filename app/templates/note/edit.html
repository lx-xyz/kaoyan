{% extends "base.html" %}
{% block title %}{% if note %}编辑{% else %}新建{% endif %}笔记 — 考研学习系统{% endblock %}

{% block extra_head %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>.ql-editor{min-height:300px;font-size:0.95rem;}</style>
{% endblock %}

{% block content %}
<div class="row"><div class="col-lg-10 mx-auto">
<h3 class="fw-bold mb-4" style="color: var(--text);"><i class="bi {% if note %}bi-pencil-square{% else %}bi-plus-square{% endif %} me-2" style="color: #E8A817;"></i>{% if note %}编辑笔记{% else %}写笔记{% endif %}</h3>

<div class="card"><div class="card-body p-4">
<form method="POST" id="note-form">
    <div class="row g-3 mb-3">
        <div class="col-md-6"><input type="text" name="title" class="form-control" placeholder="笔记标题" value="{{note.title if note else ''}}"></div>
        <div class="col-md-3">
            <select name="subject_id" class="form-select"><option value="">关联科目（可选）</option>
                {% for s in subjects %}<option value="{{s.id}}" {% if note and note.subject_id==s.id %}selected{% endif %}>{{s.name}}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-3"><input type="text" name="category" class="form-control" placeholder="分类标签（可选）" value="{{note.category if note else ''}}"></div>
    </div>

    <div class="mb-3">
        <div id="editor-container" style="background:#fff;border:1px solid #E2E8F0;border-radius:10px;"></div>
        <input type="hidden" name="content" id="note-content" value="">
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" onclick="document.getElementById('note-content').value=quill.root.innerHTML;"><i class="bi bi-check-lg me-1"></i>保存</button>
        <a href="{{url_for('note.list_notes')}}" class="btn btn-outline-secondary">取消</a>
    </div>
</form>
</div></div>
</div></div>
{% endblock %}

{% block extra_scripts %}
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
var quill = new Quill('#editor-container', {
    theme: 'snow',
    placeholder: '写笔记... Ctrl+V 粘贴图片',
    modules: {
        toolbar: [['bold','italic','underline'],[{'color':[]},{'background':[]}],[{list:'ordered'},{list:'bullet'}],['link','image','clean']],
    },
});
{% if note and note.content %}
quill.root.innerHTML = {{ note.content|tojson }};
{% endif %}

// Ctrl+V 粘贴图片自动上传
quill.root.addEventListener('paste', function(e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') === 0) {
            e.preventDefault();
            var blob = items[i].getAsFile();
            var fd = new FormData(); fd.append('image', blob, 'paste.png');
            fetch('/upload/image', {method:'POST', body:fd})
            .then(r => r.json())
            .then(data => {
                if (data.url) {
                    var range = quill.getSelection(true);
                    quill.insertEmbed(range.index, 'image', data.url);
                }
            });
            return;
        }
    }
});
</script>
{% endblock %}
